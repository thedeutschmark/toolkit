<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="28%" cy="50%" r="55%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Outer border -->
  <rect x="32" y="32" width="1136" height="566" rx="18" fill="none" stroke="#1c1c1f" stroke-width="1.5"/>

  <!-- Header divider -->
  <line x1="32" y1="118" x2="1168" y2="118" stroke="#1c1c1f" stroke-width="1"/>

  <!-- Rack light -->
  <circle cx="64" cy="75" r="5" fill="#7aa2f7" opacity="0.85"/>
  <circle cx="64" cy="75" r="10" fill="#7aa2f7" opacity="0.12"/>

  <!-- Header label -->
  <text
    x="86" y="81"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="11" font-weight="600" letter-spacing="3.5" fill="#3f3f46"
  >DEUTSCHMARK / TOOLKIT</text>

  <!-- Status indicator -->
  <circle cx="1108" cy="75" r="4" fill="#22c55e" opacity="0.75"/>
  <text
    x="1122" y="81"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="11" font-weight="500" letter-spacing="1" fill="#3f3f46"
  >live</text>

  <!-- Main heading -->
  <text
    x="80" y="290"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="102" font-weight="800" fill="#fafafa" letter-spacing="-6"
  >deutschmark</text>

  <!-- Sub-heading accent -->
  <text
    x="82" y="372"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="58" font-weight="700" fill="#7aa2f7" letter-spacing="-2"
  >toolkit</text>

  <!-- Tagline -->
  <text
    x="82" y="444"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="24" font-weight="400" fill="#71717a"
  >Creator infrastructure for widgets, connections, and broadcast setup.</text>

  <!-- Bottom URL -->
  <text
    x="82" y="558"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="15" fill="#27272a" letter-spacing="1"
  >toolkit.deutschmark.online</text>

  <!-- Decorative right-side UI chrome -->
  <rect x="940" y="185" width="200" height="10" rx="5" fill="#18181b"/>
  <rect x="940" y="207" width="155" height="10" rx="5" fill="#18181b"/>
  <rect x="940" y="229" width="188" height="10" rx="5" fill="#18181b"/>
  <rect x="940" y="265" width="135" height="10" rx="5" fill="#7aa2f7" opacity="0.22"/>
  <rect x="940" y="287" width="200" height="10" rx="5" fill="#18181b"/>
  <rect x="940" y="309" width="168" height="10" rx="5" fill="#18181b"/>
  <rect x="940" y="331" width="145" height="10" rx="5" fill="#18181b"/>
  <rect x="940" y="365" width="180" height="10" rx="5" fill="#18181b"/>
  <rect x="940" y="387" width="200" height="10" rx="5" fill="#38bdf8" opacity="0.18"/>
  <rect x="940" y="409" width="160" height="10" rx="5" fill="#18181b"/>
</svg>
